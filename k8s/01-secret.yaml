apiVersion: v1
kind: Secret
metadata:
  name: mssql-secret
  namespace: ips-app
type: Opaque
stringData:
  # ⚠️ بعد ما تعمل RDS instance، غيّر القيمة دي بالكامل بمعلومات الـ RDS بتاعتك:
  #    Server   = الـ RDS Endpoint (من صفحة الـ RDS instance في AWS Console)
  #    User Id  = الـ Master username اللي اخترته وقت إنشاء الـ RDS
  #    Password = الـ Master password اللي اخترته
  connection-string: "Server=<RDS-ENDPOINT>,1433;Database=IPS_project;User Id=<RDS-MASTER-USERNAME>;Password=<RDS-MASTER-PASSWORD>;TrustServerCertificate=True;"
