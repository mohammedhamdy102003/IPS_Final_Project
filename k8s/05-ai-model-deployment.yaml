# ─────────────────────────────────────────────────────────────────────────────
# WAF (ModSecurity + Nginx) — sits in front of the web app
# External traffic  →  WAF (NodePort 30500)  →  ips-app-service (ClusterIP)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: waf
  namespace: ips-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: waf
  template:
    metadata:
      labels:
        app: waf
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: waf
          image: mohammed102003/ips-waf:latest
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND
              value: "http://ips-app-service:8080"
            - name: MODSEC_RULE_ENGINE
              value: "DetectionOnly"
            - name: NGINX_ALWAYS_TLS_REDIRECT
              value: "off"
            - name: PORT
              value: "8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /waf-health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /waf-health
              port: 8080
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: waf-service
  namespace: ips-app
spec:
  selector:
    app: waf
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30500