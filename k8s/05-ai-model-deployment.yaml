apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-model
  namespace: ips-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-model
  template:
    metadata:
      labels:
        app: ai-model
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: ai-model
          image: mohammed102003/ips-ai-model
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1280Mi"
              cpu: "1000m"
          # تم حذف الـ Probes لتجنب مشاكل الـ 404 Not Found
---
apiVersion: v1
kind: Service
metadata:
  name: ai-model-service
  namespace: ips-app
spec:
  selector:
    app: ai-model
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
