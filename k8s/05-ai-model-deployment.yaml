apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-model
  namespace: ips-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-model
  template:
    metadata:
      labels:
        app: ai-model
      annotations:
        prometheus.io/scrape: "false"   # السيرفس دي مش بتعرض /metrics بصيغة Prometheus
    spec:
      containers:
        - name: ai-model
          image: mohammed102003/ips-ai-model # ← غيّر الاسم ده لو يوزرك مختلف
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1280Mi"
              cpu: "1000m"
          # TensorFlow بياخد وقت في أول تحميل (import + load_model) فالـ probes
          # بتدي مساحة وقت كافية قبل ما تحكم على الـ pod إنه فاشل.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30   # لحد 160 ثانية مهلة للإقلاع
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-model-service
  namespace: ips-app
spec:
  selector:
    app: ai-model
  type: ClusterIP        # داخلي بس، التطبيق هو اللي بينادي عليه، مش محتاج يتعرض للبرا
  ports:
    - port: 8000
      targetPort: 8000
