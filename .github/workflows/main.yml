name: Professional Manual CI/CD

on:
  workflow_dispatch:

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Project
        run: dotnet build

  build-and-scan:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build App Image for Scan
        run: docker build -t ips-app:test .

      - name: Scan App Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ips-app:test'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Build AI Model Image for Scan
        run: docker build -t ips-ai-model:test ./ai-model

      - name: Scan AI Model Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ips-ai-model:test'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push App Image
        run: |
          docker tag ips-app:test ${{ secrets.DOCKER_USERNAME }}/ips-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ips-app:latest

      - name: Push AI Model Image
        run: |
          docker tag ips-ai-model:test ${{ secrets.DOCKER_USERNAME }}/ips-ai-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ips-ai-model:latest

  deploy:
    needs: build-and-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy K8s + Monitoring Manifests to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_SSH_KEY }}
          source: "k8s/,monitoring/"
          target: "~/ips-k8s/"

      - name: Deploy to k3s via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_SSH_KEY }}
          script: |
            export KUBECONFIG=/home/${{ secrets.VM_USER }}/.kube/config

            kubectl apply -f ~/ips-k8s/k8s/
            kubectl apply -f ~/ips-k8s/monitoring/

            kubectl rollout restart deployment/ips-app -n ips-app
            kubectl rollout restart deployment/ai-model -n ips-app

            kubectl rollout status deployment/ips-app -n ips-app --timeout=120s
            kubectl rollout status deployment/ai-model -n ips-app --timeout=180s

            kubectl rollout status deployment/prometheus -n monitoring --timeout=120s
            kubectl rollout status deployment/grafana -n monitoring --timeout=120s

            sudo k3s crictl rmi --prune 2>/dev/null || true

            echo "✅ App is live at:        http://${{ secrets.VM_IP }}:30500"
            echo "✅ Prometheus is live at: http://${{ secrets.VM_IP }}:30090"
            echo "✅ Grafana is live at:    http://${{ secrets.VM_IP }}:30300"
