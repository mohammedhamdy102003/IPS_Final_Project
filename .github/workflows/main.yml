name: Professional Manual CI/CD

on:
  workflow_dispatch:

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Project
        # تم مسح working-directory لأنه مسبب الـ No such file or directory
        run: dotnet build 


  build-and-scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Local Image for Scan
        # تم تعديل المسار هنا ليكون النقطة الحالية (.) بدلاً من الفولدر القديم
        run: docker build -t ips-app:test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ips-app:test'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Final Image
        run: |
          docker tag ips-app:test ${{ secrets.DOCKER_USERNAME }}/ips-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ips-app:latest

  deploy:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy K8s Manifests to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_SSH_KEY }}
          source: "k8s/"
          target: "~/ips-k8s/"

      - name: Deploy to Kubernetes via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_SSH_KEY }}
          script: |
            minikube status | grep -q "Running" || minikube start
            kubectl apply -f ~/ips-k8s/k8s/
            kubectl rollout restart deployment/ips-app
            kubectl rollout status deployment/ips-app --timeout=120s
            docker image prune -f
            echo "✅ App is live at: http://$(minikube ip):30080" # اتأكد من رقم الـ NodePort بتاعك
