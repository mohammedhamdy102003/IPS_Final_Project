name: Professional Manual CI/CD

on:
  workflow_dispatch:

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Project
        working-directory: ./IPS_PROJECT
        run: dotnet build


  build-and-scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Local Image for Scan
        run: docker build -t ips-app:test ./IPS_PROJECT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ips-app:test'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Final Image
        run: |
          docker tag ips-app:test ${{ secrets.DOCKER_USERNAME }}/ips-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ips-app:latest

  # ─────────────────────────────────────────
  # 3. النشر على Kubernetes (CD)
  # ─────────────────────────────────────────
  deploy:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # محتاجينه عشان نرفع الـ manifests

      - name: Copy K8s Manifests to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_SSH_KEY }}
          source: "k8s/"            # ← فولدر الـ manifests في الـ repo بتاعك
          target: "~/ips-k8s/"     # ← هيتنسخ هنا على الـ VM

      - name: Deploy to Kubernetes via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_SSH_KEY }}
          script: |
            # ── تأكد إن minikube شغال ──
            minikube status | grep -q "Running" || minikube start

            # ── طبّق الـ manifests (كريت أو أبديت تلقائي) ──
            kubectl apply -f ~/ips-k8s/k8s/

            # ── Force pull للـ image الجديدة ──
            kubectl rollout restart deployment/ips-app -n ips-app

            # ── استنى لحد ما الـ deployment يكمّل ──
            kubectl rollout status deployment/ips-app -n ips-app --timeout=120s

            # ── نظّف الـ images القديمة ──
            docker image prune -f

            # ── اطبع الـ URL عشان تعرف التطبيق شغال ──
            echo "✅ App is live at: http://$(minikube ip):30500"
