# ModSecurity WAF — Reverse Proxy in front of ips-app
# Sits on port 8080 inside the container (exposed as NodePort 30500)
# Forwards clean traffic to ips-app-service:8080 (ClusterIP)

server {
    listen 8080;
    server_name _;

    # ── ModSecurity ─────────────────────────────────────────────────────────
    modsecurity on;
    modsecurity_rules_file /etc/modsecurity.d/include.conf;

    # Tune CRS to Detection mode first (just log, don't block yet)
    # Change to "On" to fully block malicious requests
    modsecurity_rules '
        SecRuleEngine DetectionOnly
        SecAuditLog /var/log/modsec_audit.log
        SecAuditLogParts ABCDEFHIJKZ
        SecRequestBodyAccess On
        SecResponseBodyAccess Off
        SecRequestBodyLimit 10485760
    ';

    # ── Reverse proxy to web app ─────────────────────────────────────────────
    location / {
        proxy_pass http://ips-app-service:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Health check (bypasses ModSecurity) ──────────────────────────────────
    location /waf-health {
        access_log off;
        return 200 "WAF OK\n";
        add_header Content-Type text/plain;
    }
}
