version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:8080" 
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=IPS_project;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
     
      MSSQL_SA_PASSWORD: "YourStrongPassword123!" 
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"